<section class="page">

  <div class="header">
    <h2>Dashboard</h2>
  </div>

  <div class="welcome">
    <h3>Bem-vindo 👋</h3>
    <p>Escolha uma opção para começar a gerenciar o sistema.</p>
  </div>

  <div class="cards">

    <article class="card" (click)="goToPizzas()">
      <div class="icon">🍕</div>

      <p>Gerencie o cadastro de pizzas</p>
    </article>

    <article class="card" (click)="goToClientes()">
      <div class="icon">👤</div>
      <h3>Clientes</h3>
      <p>Gerencie seus clientes</p>
    </article>

  </div>

</section>
